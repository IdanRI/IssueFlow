services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: issueflow
      POSTGRES_PASSWORD: issueflow
      POSTGRES_DB: issueflow
    ports:
      - "5432:5432"
    volumes:
      - issueflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issueflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/issueflow
      DB_USERNAME: issueflow
      DB_PASSWORD: issueflow
    depends_on:
      db:
        condition: service_healthy

volumes:
  issueflow-data:
